<!-- Dashboard Selector Dropdown (DaisyUI) -->
<div class="dropdown dropdown-end">
  <!-- Dropdown Button -->
  <button type="button" class="btn btn-ghost" [attr.aria-label]="'a11y.select_dashboard' | translate">
    <span class="material-symbols-outlined" aria-hidden="true">dashboard</span>
    <span class="hidden sm:inline ms-2">{{ getCurrentDashboardName() }}</span>
    <span class="material-symbols-outlined ms-1" aria-hidden="true">expand_more</span>
  </button>

  <!-- Dropdown Menu -->
  @if (!loading() && dashboards().length > 0) {
    <ul
      tabindex="0"
      class="dropdown-content menu bg-base-100 rounded-box z-[1] w-72 p-2 shadow-lg border border-base-300"
    >
      <!-- Default Dashboard -->
      <li>
        <button
          type="button"
          (click)="selectDefaultDashboard()"
          [class.menu-active]="currentDashboardId() === undefined"
          class="flex items-center"
        >
          <span class="material-symbols-outlined" aria-hidden="true">home</span>
          <span>Default Dashboard</span>
          @if (currentDashboardId() === undefined) {
            <span class="material-symbols-outlined ms-auto text-primary" aria-hidden="true">check</span>
          }
        </button>
      </li>

      <li class="menu-title">
        <span>All Dashboards</span>
      </li>

      <!-- Dashboard List -->
      @for (dashboard of dashboards(); track dashboard.id) {
        <li>
          <button
            type="button"
            (click)="selectDashboard(dashboard.id)"
            [class.menu-active]="currentDashboardId() === dashboard.id"
            class="flex items-center"
          >
            <span class="material-symbols-outlined" aria-hidden="true">
              {{ dashboard.is_public ? 'public' : 'lock' }}
            </span>
            <div class="flex flex-col flex-1">
              <span>{{ dashboard.display_name }}</span>
              @if (dashboard.description) {
                <span class="text-xs text-base-content/50">{{ dashboard.description }}</span>
              }
            </div>
            @if (currentDashboardId() === dashboard.id) {
              <span class="material-symbols-outlined ms-auto text-primary" aria-hidden="true">check</span>
            }
          </button>
        </li>
      }
    </ul>
  }

  <!-- Loading State -->
  @if (loading()) {
    <ul
      tabindex="0"
      class="dropdown-content menu bg-base-100 rounded-box z-[1] w-72 p-2 shadow-lg border border-base-300"
    >
      <li class="menu-disabled">
        <a class="flex items-center justify-center">
          <span class="loading loading-spinner loading-sm" aria-hidden="true"></span>
          <span class="ms-2">Loading dashboards...</span>
        </a>
      </li>
    </ul>
  }
</div>
