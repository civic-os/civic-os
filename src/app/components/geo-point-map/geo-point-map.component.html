<div class="map-wrapper not-prose">
  <div [id]="mapId"
       class="leaflet-map"
       [class.display-mode]="mode() === 'display'"
       [class.edit-mode]="mode() === 'edit'"
       [style.width]="width()"
       [style.height]="height()"
       [style.max-width]="maxWidth() || null">
  </div>

  <!-- Floating reset button (only in multi-marker mode when a marker is highlighted) -->
  @if (highlightedMarkerId() !== null && markers().length > 0) {
    <button type="button"
            class="map-reset-button"
            (click)="onResetView()"
            [attr.aria-label]="'a11y.reset_map_view' | translate"
            title="Reset view to show all markers">
      <span class="material-symbols-outlined" aria-hidden="true" style="font-size: 18px; line-height: 1;">home</span>
    </button>
  }

  @if (mode() === 'edit') {
    <div class="flex gap-2 mt-2">
      <button type="button" class="btn btn-sm btn-primary" (click)="useCurrentLocation()">
        <span class="material-symbols-outlined text-sm" aria-hidden="true">my_location</span>
        {{ 'a11y.use_my_location' | translate }}
      </button>
    </div>

    <!-- Keyboard-accessible coordinate fallback (a11y decision D4): typing valid
         decimal coordinates places the marker via the same path as a map click -->
    <div class="flex gap-2 mt-2">
      <div class="flex-1">
        <label class="label py-0" [for]="mapId + '-lat'">
          <span class="label-text text-sm">{{ 'a11y.latitude' | translate }}</span>
        </label>
        <input type="number"
               [id]="mapId + '-lat'"
               class="input input-bordered input-sm w-full"
               step="0.000001"
               min="-90"
               max="90"
               inputmode="decimal"
               [value]="latValue()"
               (input)="onCoordinateInput('lat', $any($event.target).value)" />
      </div>
      <div class="flex-1">
        <label class="label py-0" [for]="mapId + '-lng'">
          <span class="label-text text-sm">{{ 'a11y.longitude' | translate }}</span>
        </label>
        <input type="number"
               [id]="mapId + '-lng'"
               class="input input-bordered input-sm w-full"
               step="0.000001"
               min="-180"
               max="180"
               inputmode="decimal"
               [value]="lngValue()"
               (input)="onCoordinateInput('lng', $any($event.target).value)" />
      </div>
    </div>
  }
</div>
