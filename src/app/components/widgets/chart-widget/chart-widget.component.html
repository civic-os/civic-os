<div class="chart-widget-container not-prose">
  @if (isLoading()) {
    <div class="flex items-center justify-center py-8">
      <span class="loading loading-spinner loading-md"></span>
    </div>
  } @else if (error()) {
    <div class="alert alert-error">
      <span class="material-symbols-outlined">error</span>
      <span>{{ error() }}</span>
    </div>
  } @else if (chartData().length > 0) {
    @if (legendItems().length > 0) {
      <vis-bullet-legend [items]="legendItems()" />
    }
    <vis-xy-container [data]="chartData()" [height]="containerHeight()">
      <vis-grouped-bar
        [x]="xAccessor"
        [y]="yAccessors()"
        [color]="colorAccessor()"
        [roundedCorners]="4"
        [barPadding]="0.1"
        [groupPadding]="0.2"
      />
      <vis-axis type="x"
        [tickFormat]="xTickFormat()"
        [label]="config().xAxisLabel ?? ''"
        [gridLine]="false"
      />
      <vis-axis type="y"
        [label]="config().yAxisLabel ?? ''"
        [tickFormat]="yTickFormat"
      />
    </vis-xy-container>
  } @else {
    <div class="flex flex-col items-center justify-center py-8">
      <span class="material-symbols-outlined text-5xl text-base-content opacity-30">bar_chart</span>
      <p class="mt-4 text-base-content opacity-60">No data to display</p>
    </div>
  }
</div>
